services:
  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile
    ports:
      - "5001:8080"

  orders-api:
    build:
      context: .
      dockerfile: src/Services/Orders/Orders.Api/Dockerfile
    ports:
      - "5002:8080"

  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.Api/Dockerfile
    environment:
      Services__CatalogUrl: http://catalog-api:8080
      Services__OrdersUrl: http://orders-api:8080
    ports:
      - "5000:8080"
    depends_on:
      - catalog-api
      - orders-api
